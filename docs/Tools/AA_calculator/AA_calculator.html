<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>团建分账计算器</title>
	<!-- 定义表格样式 -->
	<style>
		table {
			border-collapse: collapse;
			width: 100%;
		}

		th,
		td {
			border: 1px solid black;
			padding: 8px;
			text-align: center;
		}

		th {
			background-color: #b0f4e9;
		}

		.calc-btn {
			background-color: #dc3545;
			border: none;
			color: white;
			padding: 10px 20px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
			font-size: 16px;
			margin: 4px 2px;
			cursor: pointer;
			border-radius: 5px;
		}

		button {
			background-color: #198754;
			border: none;
			color: white;
			padding: 10px 20px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
			font-size: 16px;
			margin: 4px 2px;
			cursor: pointer;
			border-radius: 5px;
		}
	</style>
</head>

<body>
	<h1>团建分账计算器</h1>
	<table id="aa-table">
		<tr>
			<th>
				<table style="width: 100%; border-collapse: collapse;">
					<tr>
						<!-- <th style="border: none;">项目名称</th>
						<th style="border: none;">总开销</th>
						<th style="border: none;">结账人</th> -->
					</tr>
				</table>
			</th>
		</tr>
	</table>
	<!-- 添加/删除 行和列的按钮 -->
	<button onclick="addColumn()">添加参与人</button>
	<button onclick="removeColumn()">减少参与人</button>
	<button onclick="addRow()">添加项目</button>
	<button onclick="removeRow()">减少项目</button>
	<button class="calc-btn" onclick="calculateTotalAmounts()">计算!</button>

	<details style="margin-top: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 5px; background-color: #f9f9f9;">
		<summary style="font-weight: bold; cursor: pointer; outline: none;">高级功能</summary>
		<div style="margin-top: 15px;">
			<input type="checkbox" id="auto-save">
			<label for="auto-save" style="margin-right: 15px;">计算时自动保存记录(CSV)</label>
			<button onclick="exportToCSV()" style="background-color: #0dcaf0; color: black;">导出为CSV</button>
			<input type="file" id="import-csv" style="display: none;" accept=".csv" onchange="handleImport(event)">
			<button onclick="document.getElementById('import-csv').click()" style="background-color: #ffc107; color: black;">导入CSV</button>
		</div>
	</details>

	<script src="script.js"></script>
</body>

</html>
